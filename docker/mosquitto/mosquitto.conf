# Lokal Mosquitto broker til eNet udvikling
# Port 1883 (internt i container) - eksponeres som 11883 på hosten

listener 1883
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
log_timestamp true

# WebSocket support (port 9001 internt → 19001 på host)
listener 9001
protocol websockets
